[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "TID"]

[tool.ruff.lint.flake8-tidy-imports]
[tool.ruff.lint.flake8-tidy-imports.banned-api]
"fastapi.APIRouter".msg = "Use core.routing.waooaw_router() instead of bare APIRouter(). See docs/CP/iterations/NFRReusable.md §5 P-3."

[tool.ruff.lint.per-file-ignores]
# The factory itself is allowed to import APIRouter
"core/routing.py" = ["TID251"]
