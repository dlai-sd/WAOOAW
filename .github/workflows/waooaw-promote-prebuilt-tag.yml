name: WAOOAW Promote Prebuilt Tag

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [demo, uat, prod]
        default: demo
      terraform_action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply]
        default: apply
      image_tag:
        description: "Existing Artifact Registry tag to promote unchanged"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: waooaw-promote-${{ inputs.environment }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: waooaw-oauth
  GCP_REGION: asia-south1
  GCP_REGISTRY: asia-south1-docker.pkg.dev/waooaw-oauth/waooaw

jobs:
  detect:
    name: Detect Components
    runs-on: ubuntu-latest
    outputs:
      has_cp: ${{ steps.detect.outputs.has_cp }}
      has_pp: ${{ steps.detect.outputs.has_pp }}
      has_plant: ${{ steps.detect.outputs.has_plant }}
      has_plant_gateway: ${{ steps.detect.outputs.has_plant_gateway }}
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect component Dockerfiles
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_cp=false
          has_pp=false
          has_plant=false
          has_plant_gateway=false

          if [ -f src/CP/BackEnd/Dockerfile ] && [ -f src/CP/FrontEnd/Dockerfile ]; then
            has_cp=true
          fi

          if [ -f src/PP/BackEnd/Dockerfile ] && [ -f src/PP/FrontEnd/Dockerfile ]; then
            has_pp=true
          fi

          if [ -f src/Plant/BackEnd/Dockerfile ]; then
            has_plant=true
          fi

          if [ -f src/Plant/Gateway/Dockerfile ]; then
            has_plant_gateway=true
          fi

          echo "has_cp=${has_cp}" >> "$GITHUB_OUTPUT"
          echo "has_pp=${has_pp}" >> "$GITHUB_OUTPUT"
          echo "has_plant=${has_plant}" >> "$GITHUB_OUTPUT"
          echo "has_plant_gateway=${has_plant_gateway}" >> "$GITHUB_OUTPUT"

      - name: Fail if no components detected
        if: steps.detect.outputs.has_cp != 'true' && steps.detect.outputs.has_pp != 'true' && steps.detect.outputs.has_plant != 'true'
        run: |
          echo "No deployable components detected (missing Dockerfiles)." >&2
          exit 1

      - name: Fail if Plant backend exists without Plant Gateway
        if: steps.detect.outputs.has_plant == 'true' && steps.detect.outputs.has_plant_gateway != 'true'
        run: |
          echo "Plant backend detected but Plant Gateway Dockerfile missing." >&2
          exit 1

  verify-images:
    name: Verify Prebuilt Images Exist
    runs-on: ubuntu-latest
    needs: [detect]
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify all required images for the requested tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.image_tag }}"
          IMAGES=()

          if [[ "${{ needs.detect.outputs.has_cp }}" == "true" ]]; then
            IMAGES+=(cp cp-backend)
          fi

          if [[ "${{ needs.detect.outputs.has_pp }}" == "true" ]]; then
            IMAGES+=(pp pp-backend)
          fi

          if [[ "${{ needs.detect.outputs.has_plant }}" == "true" ]]; then
            IMAGES+=(plant-backend)
          fi

          if [[ "${{ needs.detect.outputs.has_plant_gateway }}" == "true" ]]; then
            IMAGES+=(plant-gateway plant-opa)
          fi

          for image in "${IMAGES[@]}"; do
            echo "Checking ${image}:${TAG}"
            gcloud artifacts docker images describe "${{ env.GCP_REGISTRY }}/${image}:${TAG}" >/dev/null
          done

  terraform-plan:
    name: Terraform Plan (Prebuilt Tag)
    runs-on: ubuntu-latest
    needs: [detect, verify-images]
    if: inputs.terraform_action == 'plan' && !failure() && !cancelled()
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt check (stacks + modules)
        run: terraform fmt -recursive -check cloud/terraform/stacks cloud/terraform/modules

      - name: Plan Plant stack
        if: needs.detect.outputs.has_plant == 'true'
        working-directory: cloud/terraform/stacks/plant
        env:
          TF_VAR_database_password: ${{ secrets.PLANT_DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/plant" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"

      - name: Plan CP stack
        if: needs.detect.outputs.has_cp == 'true'
        working-directory: cloud/terraform/stacks/cp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/cp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}"

      - name: Plan PP stack
        if: needs.detect.outputs.has_pp == 'true'
        working-directory: cloud/terraform/stacks/pp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/pp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"

  terraform-apply:
    name: Terraform Apply (Prebuilt Tag)
    runs-on: ubuntu-latest
    needs: [detect, verify-images]
    if: inputs.terraform_action == 'apply' && !failure() && !cancelled()
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt check (stacks + modules)
        run: terraform fmt -recursive -check cloud/terraform/stacks cloud/terraform/modules

      - name: Terraform validate (no backend)
        shell: bash
        run: |
          set -euo pipefail
          for d in cloud/terraform/stacks/cp cloud/terraform/stacks/pp cloud/terraform/stacks/plant; do
            echo "--- validate: $d"
            (cd "$d" && terraform init -backend=false -input=false >/dev/null && terraform validate)
          done

      - name: Apply Plant stack
        if: needs.detect.outputs.has_plant == 'true'
        working-directory: cloud/terraform/stacks/plant
        env:
          TF_VAR_database_password: ${{ secrets.PLANT_DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/plant" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"
          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"

          PLANT_GATEWAY_URL="$(terraform output -raw plant_gateway_url)"
          echo "Resolved Plant Gateway URL: ${PLANT_GATEWAY_URL}"
          echo "PLANT_GATEWAY_URL=${PLANT_GATEWAY_URL}" >> "$GITHUB_ENV"

      - name: Apply CP stack
        if: needs.detect.outputs.has_cp == 'true'
        working-directory: cloud/terraform/stacks/cp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/cp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}" \
            -var="plant_gateway_url=${PLANT_GATEWAY_URL:-}"
          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}" \
            -var="plant_gateway_url=${PLANT_GATEWAY_URL:-}"

      - name: Apply PP stack
        if: needs.detect.outputs.has_pp == 'true'
        working-directory: cloud/terraform/stacks/pp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.image_tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/pp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"
          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"

      - name: Wait for Cloud Run propagation
        run: |
          echo "Waiting 30 seconds for Cloud Run services to propagate..."
          sleep 30

      - name: Health checks with canonical domains
        shell: bash
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"

          resolve_url() {
            case "$1:$2" in
              demo:cp) echo "https://cp.demo.waooaw.com/health" ;;
              uat:cp) echo "https://cp.uat.waooaw.com/health" ;;
              prod:cp) echo "https://www.waooaw.com/health" ;;
              demo:pp) echo "https://pp.demo.waooaw.com/health" ;;
              uat:pp) echo "https://pp.uat.waooaw.com/health" ;;
              prod:pp) echo "https://pp.waooaw.com/health" ;;
              demo:plant) echo "https://plant.demo.waooaw.com/health" ;;
              uat:plant) echo "https://plant.uat.waooaw.com/health" ;;
              prod:plant) echo "https://plant.waooaw.com/health" ;;
              *)
                echo "Unsupported environment/service pair: $1:$2" >&2
                return 1
                ;;
            esac
          }

          check_health() {
            local service="$1"
            local url="$2"
            for i in {1..10}; do
              echo "[${service}] Attempt ${i}/10 -> ${url}"
              if curl -f -s -m 15 "$url" >/dev/null; then
                echo "OK ${service} health check passed"
                return 0
              fi
              [ "$i" -lt 10 ] && sleep 30
            done
            echo "::error::${service} health check failed after 10 attempts"
            return 1
          }

          pids=()

          if [[ "${{ needs.detect.outputs.has_cp }}" == "true" ]]; then
            check_health "CP" "$(resolve_url "$ENV" cp)" &
            pids+=($!)
          fi

          if [[ "${{ needs.detect.outputs.has_pp }}" == "true" ]]; then
            check_health "PP" "$(resolve_url "$ENV" pp)" &
            pids+=($!)
          fi

          if [[ "${{ needs.detect.outputs.has_plant }}" == "true" ]]; then
            check_health "Plant" "$(resolve_url "$ENV" plant)" &
            pids+=($!)
          fi

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done

          exit "$failed"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [detect, verify-images, terraform-plan, terraform-apply]
    if: always()
    steps:
      - name: Write summary
        run: |
          {
            echo "Environment: ${{ inputs.environment }}"
            echo "Image tag: ${{ inputs.image_tag }}"
            echo "Action: ${{ inputs.terraform_action }}"
            echo "Promotion mode: prebuilt tag only"
          } >> "$GITHUB_STEP_SUMMARY"