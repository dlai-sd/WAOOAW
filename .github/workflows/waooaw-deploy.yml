name: WAOOAW Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [demo, uat, prod]
        default: demo
      terraform_action:
        description: "Terraform action"
        required: true
        type: choice
        options: [plan, apply]
        default: plan
      image_tag_override:
        description: "Use an existing image tag (skip building new images)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: waooaw-deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: waooaw-oauth
  GCP_REGION: asia-south1
  GCP_REGISTRY: asia-south1-docker.pkg.dev/waooaw-oauth/waooaw

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. RESOLVE IMAGE TAG
  # ──────────────────────────────────────────────────────────
  resolve:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          set -euo pipefail
          SHA_SHORT="${GITHUB_SHA::7}"
          if [ -n "${{ inputs.image_tag_override }}" ]; then
            echo "tag=${{ inputs.image_tag_override }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${SHA_SHORT}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────
  # 2. DETECT COMPONENTS  (shallow clone — file existence only)
  # ──────────────────────────────────────────────────────────
  detect:
    name: Detect Components
    runs-on: ubuntu-latest
    outputs:
      has_cp: ${{ steps.detect.outputs.has_cp }}
      has_pp: ${{ steps.detect.outputs.has_pp }}
      has_plant: ${{ steps.detect.outputs.has_plant }}
      has_plant_gateway: ${{ steps.detect.outputs.has_plant_gateway }}
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect component Dockerfiles
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          has_cp=false
          has_pp=false
          has_plant=false
          has_plant_gateway=false

          if [ -f src/CP/BackEnd/Dockerfile ] && [ -f src/CP/FrontEnd/Dockerfile ]; then
            has_cp=true
          fi

          if [ -f src/PP/BackEnd/Dockerfile ] && [ -f src/PP/FrontEnd/Dockerfile ]; then
            has_pp=true
          fi

          if [ -f src/Plant/BackEnd/Dockerfile ]; then
            has_plant=true
          fi

          if [ -f src/Plant/Gateway/Dockerfile ]; then
            has_plant_gateway=true
          fi

          echo "has_cp=${has_cp}" >> "$GITHUB_OUTPUT"
          echo "has_pp=${has_pp}" >> "$GITHUB_OUTPUT"
          echo "has_plant=${has_plant}" >> "$GITHUB_OUTPUT"
          echo "has_plant_gateway=${has_plant_gateway}" >> "$GITHUB_OUTPUT"

      - name: Fail if no components detected
        if: steps.detect.outputs.has_cp != 'true' && steps.detect.outputs.has_pp != 'true' && steps.detect.outputs.has_plant != 'true'
        run: |
          echo "No deployable components detected (missing Dockerfiles)." >&2
          echo "Expected at least one of:" >&2
          echo "- src/CP/BackEnd/Dockerfile + src/CP/FrontEnd/Dockerfile" >&2
          echo "- src/PP/BackEnd/Dockerfile + src/PP/FrontEnd/Dockerfile" >&2
          echo "- src/Plant/BackEnd/Dockerfile" >&2
          exit 1

  # ──────────────────────────────────────────────────────────
  # 3a. SECURITY SCAN — Python backends
  #     Runs natively on the runner (no Docker-in-Docker).
  #     Executes in PARALLEL with scan-npm.
  # ──────────────────────────────────────────────────────────
  scan-pip:
    name: Pip-audit (Python backends)
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install -q pip-audit

      - name: pip-audit CP Backend
        if: needs.detect.outputs.has_cp == 'true'
        run: |
          set -euo pipefail
          pip-audit -r src/CP/BackEnd/requirements.txt -f json -o pip-audit-cp.json || true
          test -f pip-audit-cp.json || echo '[]' > pip-audit-cp.json

      - name: pip-audit Plant Backend
        if: needs.detect.outputs.has_plant == 'true'
        run: |
          set -euo pipefail
          pip-audit -r src/Plant/BackEnd/requirements.txt -f json -o pip-audit-plant.json || true
          test -f pip-audit-plant.json || echo '[]' > pip-audit-plant.json

      - name: Upload pip-audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-reports
          path: pip-audit-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # 3b. SECURITY SCAN — Node frontends
  #     npm cache avoids a full re-download on subsequent runs.
  #     Executes in PARALLEL with scan-pip.
  # ──────────────────────────────────────────────────────────
  scan-npm:
    name: Npm-audit (Node frontends)
    runs-on: ubuntu-latest
    needs: [detect]
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            src/CP/FrontEnd/package-lock.json
            src/PP/FrontEnd/package-lock.json

      - name: npm audit CP Frontend
        if: needs.detect.outputs.has_cp == 'true'
        working-directory: src/CP/FrontEnd
        run: |
          set -euo pipefail
          npm ci --prefer-offline --ignore-scripts
          npm audit --audit-level=high --json > "$GITHUB_WORKSPACE/npm-audit-cp.json" || true
          test -f "$GITHUB_WORKSPACE/npm-audit-cp.json" || echo '{}' > "$GITHUB_WORKSPACE/npm-audit-cp.json"

      - name: npm audit PP Frontend
        if: needs.detect.outputs.has_pp == 'true'
        working-directory: src/PP/FrontEnd
        run: |
          set -euo pipefail
          npm ci --prefer-offline --ignore-scripts
          npm audit --audit-level=high --json > "$GITHUB_WORKSPACE/npm-audit-pp.json" || true
          test -f "$GITHUB_WORKSPACE/npm-audit-pp.json" || echo '{}' > "$GITHUB_WORKSPACE/npm-audit-pp.json"

      - name: Upload npm audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: npm-audit-*.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # 4a. BUILD — CP images (parallel with build-pp & build-plant)
  #     Uses GHA Docker layer cache; skips if tag override set.
  # ──────────────────────────────────────────────────────────
  build-cp:
    name: Build CP Images
    runs-on: ubuntu-latest
    needs: [resolve, detect, scan-pip, scan-npm]
    if: needs.detect.outputs.has_cp == 'true' && inputs.image_tag_override == ''
    environment: ${{ inputs.environment }}
    timeout-minutes: 20

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push CP Backend
        uses: docker/build-push-action@v6
        with:
          context: src/CP/BackEnd
          file: src/CP/BackEnd/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/cp-backend:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/cp-backend:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=cp-backend
          cache-to: type=gha,mode=max,scope=cp-backend

      - name: Build & Push CP Frontend
        uses: docker/build-push-action@v6
        with:
          context: src/CP/FrontEnd
          file: src/CP/FrontEnd/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/cp:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/cp:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=cp-frontend
          cache-to: type=gha,mode=max,scope=cp-frontend

  # ──────────────────────────────────────────────────────────
  # 4b. BUILD — PP images (parallel with build-cp & build-plant)
  # ──────────────────────────────────────────────────────────
  build-pp:
    name: Build PP Images
    runs-on: ubuntu-latest
    needs: [resolve, detect, scan-pip, scan-npm]
    if: needs.detect.outputs.has_pp == 'true' && inputs.image_tag_override == ''
    environment: ${{ inputs.environment }}
    timeout-minutes: 20

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push PP Backend
        uses: docker/build-push-action@v6
        with:
          context: src/PP/BackEnd
          file: src/PP/BackEnd/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/pp-backend:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/pp-backend:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=pp-backend
          cache-to: type=gha,mode=max,scope=pp-backend

      - name: Build & Push PP Frontend
        uses: docker/build-push-action@v6
        with:
          context: src/PP/FrontEnd
          file: src/PP/FrontEnd/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/pp:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/pp:${{ inputs.environment }}-latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
            VITE_ENVIRONMENT=${{ inputs.environment }}
          cache-from: type=gha,scope=pp-frontend
          cache-to: type=gha,mode=max,scope=pp-frontend

  # ──────────────────────────────────────────────────────────
  # 4c. BUILD — Plant images (parallel with build-cp & build-pp)
  # ──────────────────────────────────────────────────────────
  build-plant:
    name: Build Plant Images
    runs-on: ubuntu-latest
    needs: [resolve, detect, scan-pip, scan-npm]
    if: needs.detect.outputs.has_plant == 'true' && inputs.image_tag_override == ''
    environment: ${{ inputs.environment }}
    timeout-minutes: 20

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Plant Backend
        uses: docker/build-push-action@v6
        with:
          context: src/Plant/BackEnd
          file: src/Plant/BackEnd/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/plant-backend:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/plant-backend:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=plant-backend
          cache-to: type=gha,mode=max,scope=plant-backend

      - name: Build & Push Plant Gateway
        if: needs.detect.outputs.has_plant_gateway == 'true'
        uses: docker/build-push-action@v6
        with:
          context: src/Plant/Gateway
          file: src/Plant/Gateway/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/plant-gateway:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/plant-gateway:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=plant-gateway
          cache-to: type=gha,mode=max,scope=plant-gateway

      - name: Build & Push Plant OPA
        if: needs.detect.outputs.has_plant_gateway == 'true'
        uses: docker/build-push-action@v6
        with:
          context: src/Plant/Gateway/opa
          file: src/Plant/Gateway/opa/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGISTRY }}/plant-opa:${{ needs.resolve.outputs.tag }}
            ${{ env.GCP_REGISTRY }}/plant-opa:${{ inputs.environment }}-latest
          cache-from: type=gha,scope=plant-opa
          cache-to: type=gha,mode=max,scope=plant-opa

  # ──────────────────────────────────────────────────────────
  # 5a. TERRAFORM PLAN  (runs when terraform_action == 'plan')
  # ──────────────────────────────────────────────────────────
  terraform_plan:
    name: Terraform Plan (Stacks)
    runs-on: ubuntu-latest
    needs: [resolve, detect, build-cp, build-pp, build-plant]
    if: inputs.terraform_action == 'plan' && !failure() && !cancelled()
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          echo "::error::Set vars.GCP_WORKLOAD_IDENTITY_PROVIDER + vars.GCP_SERVICE_ACCOUNT_EMAIL, or set secret GCP_SA_KEY in that GitHub Environment."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt check (stacks + modules)
        run: terraform fmt -recursive -check cloud/terraform/stacks cloud/terraform/modules

      - name: Plan CP stack
        if: needs.detect.outputs.has_cp == 'true'
        working-directory: cloud/terraform/stacks/cp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/cp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}"

      - name: Plan PP stack
        if: needs.detect.outputs.has_pp == 'true'
        working-directory: cloud/terraform/stacks/pp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/pp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"

      - name: Plan Plant stack
        if: needs.detect.outputs.has_plant == 'true'
        working-directory: cloud/terraform/stacks/plant
        env:
          TF_VAR_database_password: ${{ secrets.PLANT_DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init -backend=false -input=false
          terraform validate
          terraform init \
            -backend-config="prefix=env/${ENV}/plant" \
            -reconfigure \
            -input=false

          # Attempt plan with shorter timeout — if locked, check if stale
          if ! terraform plan \
            -lock-timeout=2m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}" 2>&1 | tee plan_output.txt; then

            if grep -q "Error acquiring the state lock" plan_output.txt; then
              echo "::warning::Terraform state is locked. Checking if lock is stale..."

              LOCK_ID=$(grep "ID:" plan_output.txt | awk '{print $2}')
              LOCK_TIME=$(grep "Created:" plan_output.txt | sed 's/.*Created: //' | awk '{print $1, $2}')

              echo "Lock ID: $LOCK_ID"
              echo "Lock created: $LOCK_TIME"

              LOCK_EPOCH=$(date -d "$LOCK_TIME" +%s 2>/dev/null || date -j -f "%Y-%m-%d %H:%M:%S" "$LOCK_TIME" +%s)
              NOW_EPOCH=$(date +%s)
              LOCK_AGE=$((NOW_EPOCH - LOCK_EPOCH))
              LOCK_AGE_MIN=$((LOCK_AGE / 60))

              echo "Lock age: ${LOCK_AGE_MIN} minutes"

              if [ $LOCK_AGE -gt 1200 ]; then
                echo "::warning::Lock is stale (${LOCK_AGE_MIN} min old). Auto-unlocking..."
                terraform force-unlock -force "$LOCK_ID"

                terraform plan \
                  -lock-timeout=5m \
                  -var-file="environments/${ENV}.tfvars" \
                  -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
                  -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
                  -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"
              else
                echo "::error::Lock is recent (${LOCK_AGE_MIN} min old). Another job may be in progress."
                exit 1
              fi
            else
              cat plan_output.txt
              exit 1
            fi
          fi

  # ──────────────────────────────────────────────────────────
  # 5b. TERRAFORM APPLY  (runs when terraform_action == 'apply')
  #     Stack order: Plant → CP → PP (CP needs Plant gateway URL).
  #     Health checks run in parallel via background processes.
  # ──────────────────────────────────────────────────────────
  terraform_apply:
    name: Terraform Apply (Stacks)
    runs-on: ubuntu-latest
    needs: [resolve, detect, build-cp, build-pp, build-plant]
    if: inputs.terraform_action == 'apply' && !failure() && !cancelled()
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate GCP auth configuration
        shell: bash
        env:
          HAS_WIF: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
          HAS_JSON_KEY: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          set -euo pipefail
          if [[ "${HAS_WIF}" == "true" ]]; then exit 0; fi
          if [[ "${HAS_JSON_KEY}" == "true" ]]; then exit 0; fi
          echo "::error::Missing GCP auth configuration for environment '${{ inputs.environment }}'."
          echo "::error::Set vars.GCP_WORKLOAD_IDENTITY_PROVIDER + vars.GCP_SERVICE_ACCOUNT_EMAIL, or set secret GCP_SA_KEY in that GitHub Environment."
          exit 1

      - name: Authenticate to Google Cloud
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ !(vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt check (stacks + modules)
        run: terraform fmt -recursive -check cloud/terraform/stacks cloud/terraform/modules

      - name: Terraform validate (no backend)
        shell: bash
        run: |
          set -euo pipefail
          for d in cloud/terraform/stacks/cp cloud/terraform/stacks/pp cloud/terraform/stacks/plant; do
            echo "--- validate: $d"
            (cd "$d" && terraform init -backend=false -input=false >/dev/null && terraform validate)
          done

      - name: Apply Plant stack
        if: needs.detect.outputs.has_plant == 'true'
        working-directory: cloud/terraform/stacks/plant
        env:
          TF_VAR_database_password: ${{ secrets.PLANT_DB_PASSWORD }}
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/plant" \
            -reconfigure \
            -input=false

          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"

          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="plant_backend_image=${{ env.GCP_REGISTRY }}/plant-backend:${TAG}" \
            -var="plant_gateway_image=${{ env.GCP_REGISTRY }}/plant-gateway:${TAG}" \
            -var="plant_opa_image=${{ env.GCP_REGISTRY }}/plant-opa:${TAG}"

          PLANT_GATEWAY_URL="$(terraform output -raw plant_gateway_url)"
          echo "Resolved Plant Gateway URL: ${PLANT_GATEWAY_URL}"
          echo "PLANT_GATEWAY_URL=${PLANT_GATEWAY_URL}" >> "$GITHUB_ENV"

      - name: Apply CP stack
        if: needs.detect.outputs.has_cp == 'true'
        working-directory: cloud/terraform/stacks/cp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/cp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}" \
            -var="plant_gateway_url=${PLANT_GATEWAY_URL:-}"
          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="cp_frontend_image=${{ env.GCP_REGISTRY }}/cp:${TAG}" \
            -var="cp_backend_image=${{ env.GCP_REGISTRY }}/cp-backend:${TAG}" \
            -var="plant_gateway_url=${PLANT_GATEWAY_URL:-}"

      - name: Apply PP stack
        if: needs.detect.outputs.has_pp == 'true'
        working-directory: cloud/terraform/stacks/pp
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          TAG="${{ needs.resolve.outputs.tag }}"
          terraform init \
            -backend-config="prefix=env/${ENV}/pp" \
            -reconfigure \
            -input=false
          terraform plan \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"
          terraform apply -auto-approve \
            -lock-timeout=5m \
            -var-file="environments/${ENV}.tfvars" \
            -var="pp_frontend_image=${{ env.GCP_REGISTRY }}/pp:${TAG}" \
            -var="pp_backend_image=${{ env.GCP_REGISTRY }}/pp-backend:${TAG}"

      - name: Wait for Cloud Run propagation
        run: |
          echo "Waiting 30 seconds for Cloud Run services to propagate..."
          sleep 30

      - name: Health checks (CP, PP, Plant in parallel)
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          HAS_CP="${{ needs.detect.outputs.has_cp }}"
          HAS_PP="${{ needs.detect.outputs.has_pp }}"
          HAS_PLANT="${{ needs.detect.outputs.has_plant }}"

          check_health() {
            local service="$1"
            local url="$2"
            for i in {1..10}; do
              echo "[${service}] Attempt ${i}/10..."
              if curl -f -s -m 10 "$url" | grep -q "healthy\|ok"; then
                echo "OK ${service} health check passed"
                return 0
              fi
              [ $i -lt 10 ] && sleep 30
            done
            echo "::error::${service} health check failed after 10 attempts"
            return 1
          }

          pids=()

          if [[ "$HAS_CP" == "true" ]]; then
            check_health "CP" "https://cp.${ENV}.waooaw.com/health" &
            pids+=($!)
          fi

          if [[ "$HAS_PP" == "true" ]]; then
            check_health "PP" "https://pp.${ENV}.waooaw.com/health" &
            pids+=($!)
          fi

          if [[ "$HAS_PLANT" == "true" ]]; then
            check_health "Plant" "https://plant.${ENV}.waooaw.com/health" &
            pids+=($!)
          fi

          failed=0
          for pid in "${pids[@]}"; do
            wait "$pid" || failed=1
          done

          exit $failed

  # ──────────────────────────────────────────────────────────
  # 6. SUMMARY
  # ──────────────────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [resolve, detect, terraform_plan, terraform_apply]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Terraform: ${{ inputs.terraform_action }}" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: ${{ needs.resolve.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Has CP: ${{ needs.detect.outputs.has_cp }}" >> $GITHUB_STEP_SUMMARY
          echo "Has PP: ${{ needs.detect.outputs.has_pp }}" >> $GITHUB_STEP_SUMMARY
          echo "Has Plant: ${{ needs.detect.outputs.has_plant }}" >> $GITHUB_STEP_SUMMARY
