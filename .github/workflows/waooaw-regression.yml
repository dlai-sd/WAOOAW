name: WAOOAW Web Backend Regression

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Regression scope (full or quick)'
        required: true
        default: 'quick'
        type: choice
        options:
          - full
          - quick

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static analysis
        run: bash scripts/static-analysis.sh

  unit-api-tests:
    name: Unit + API Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Run unit and API tests (Plant)
        run: docker compose -f docker-compose.test.yml run plant-backend-test pytest -m "unit or api" --tb=short
      - name: Run unit and API tests (CP)
        run: docker compose -f docker-compose.test.yml run cp-backend-test pytest -m "unit or api" --tb=short
      - name: Run unit and API tests (PP)
        run: docker compose -f docker-compose.test.yml run pp-backend-test pytest -m "unit or api" --tb=short

  property-bdd-tests:
    name: Property + BDD Tests
    runs-on: ubuntu-latest
    needs: unit-api-tests
    steps:
      - uses: actions/checkout@v4
      - name: Property tests
        run: docker compose -f docker-compose.test.yml run plant-backend-test pytest -m property --tb=short
      - name: BDD tests (Plant)
        run: docker compose -f docker-compose.test.yml run plant-backend-test pytest -m bdd --tb=short
      - name: BDD tests (CP)
        run: docker compose -f docker-compose.test.yml run cp-backend-test pytest -m bdd --tb=short

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-api-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: docker compose -f docker-compose.test.yml run plant-backend-test pytest -m integration --tb=short

  contract-tests:
    name: Contract Tests (Pact)
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: CP consumer pacts
        run: docker compose -f docker-compose.test.yml run cp-backend-test pytest -m contract --tb=short
      - name: Gateway provider verification
        run: docker compose -f docker-compose.test.yml run plant-gateway-test pytest -m contract --tb=short

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run Playwright E2E tests
        run: docker compose -f docker-compose.test.yml run playwright npx playwright test --reporter=html

  performance-tests:
    name: Performance Tests (Locust)
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: ${{ github.event.inputs.scope == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Locust load test
        run: |
          docker compose -f docker-compose.test.yml run locust \
            --headless -u 50 -r 5 --run-time 60s \
            --html /mnt/locust/reports/report.html

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST scans
        run: bash scripts/security-scan.sh
      - name: Run DAST (ZAP)
        run: docker compose -f docker-compose.test.yml run zap

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-api-tests, property-bdd-tests, integration-tests, contract-tests, e2e-tests, security-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Summarise results
        run: echo "Regression complete — scope=${{ github.event.inputs.scope }}"
