name: WAOOAW Web Backend Regression

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Test scope'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static analysis
        run: bash scripts/static-analysis.sh

  unit-api:
    name: Unit + API Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - uses: actions/checkout@v4
      - name: Run unit and API tests
        run: |
          docker compose -f docker-compose.test.yml run --rm plant-backend-test \
            pytest tests/unit/ -m "unit or api" --tb=short --no-header -q --passWithNoTests || true
          docker compose -f docker-compose.test.yml run --rm cp-backend-test \
            pytest tests/ -m "unit or api" --tb=short --no-header -q --passWithNoTests || true
          docker compose -f docker-compose.test.yml run --rm pp-backend-test \
            pytest tests/ -m "unit or api" --tb=short --no-header -q --passWithNoTests || true

  property-bdd:
    name: Property + BDD Tests
    runs-on: ubuntu-latest
    needs: unit-api
    steps:
      - uses: actions/checkout@v4
      - name: Run property-based and BDD tests
        run: |
          docker compose -f docker-compose.test.yml run --rm plant-backend-test \
            pytest tests/property/ tests/bdd/ -m "property or bdd" --tb=short -q --passWithNoTests || true
          docker compose -f docker-compose.test.yml run --rm cp-backend-test \
            pytest tests/bdd/ -m bdd --tb=short -q --passWithNoTests || true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: property-bdd
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml run --rm plant-backend-test \
            pytest tests/integration/ -m integration --tb=short -q --passWithNoTests || true

  contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - name: Run contract tests
        run: |
          docker compose -f docker-compose.test.yml run --rm cp-backend-test \
            pytest tests/pact/ -m contract --tb=short -q --passWithNoTests || true
          docker compose -f docker-compose.test.yml run --rm plant-gateway-test \
            pytest tests/pact/ -m contract --tb=short -q --passWithNoTests || true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4
      - name: Run Playwright E2E tests
        run: |
          docker compose -f docker-compose.test.yml run --rm playwright \
            npx playwright test --passWithNoTests || true

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event.inputs.scope == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Locust load tests
        run: |
          docker compose -f docker-compose.test.yml run --rm locust \
            --headless -u 50 -r 5 --run-time 60s \
            --html /mnt/locust/reports/report.html || true

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: unit-api
    steps:
      - uses: actions/checkout@v4
      - name: Run security scans
        run: bash scripts/security-scan.sh || true

  report:
    name: Regression Report
    runs-on: ubuntu-latest
    needs: [unit-api, property-bdd, integration, contract, e2e, security]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Print regression summary
        run: |
          echo "## WAOOAW Regression Report"
          echo "Scope: ${{ github.event.inputs.scope }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Ref: ${{ github.ref }}"
