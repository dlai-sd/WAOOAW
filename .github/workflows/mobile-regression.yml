name: WAOOAW Mobile Regression

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Test scope'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

jobs:
  static:
    name: Static Analysis (Mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run mobile static analysis
        run: |
          docker compose -f docker-compose.test.yml run --rm mobile-test \
            npx tsc --noEmit || true

  unit-ui:
    name: Unit + UI Tests
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6
      - name: Run mobile unit and UI tests
        run: |
          docker compose -f docker-compose.test.yml run --rm mobile-test \
            --runInBand --coverage --passWithNoTests || true

  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: unit-ui
    steps:
      - uses: actions/checkout@v6
      - name: Run accessibility tests
        run: |
          docker compose -f docker-compose.test.yml run --rm mobile-test \
            --testPathPattern="accessibility" --runInBand --passWithNoTests || true

  e2e-maestro:
    name: Maestro E2E (Mobile)
    runs-on: ubuntu-latest
    needs: accessibility
    if: ${{ github.event.inputs.scope == 'full' }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Maestro flows
        run: |
          docker compose -f docker-compose.test.yml run --rm maestro \
            maestro test tests/e2e/mobile/auth_otp.yaml || true

  mutation:
    name: Mutation Testing (Mobile)
    runs-on: ubuntu-latest
    needs: unit-ui
    if: ${{ github.event.inputs.scope == 'full' }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Stryker mutation tests
        run: |
          docker compose -f docker-compose.test.yml run --rm mobile-test \
            npx stryker run || true

  report:
    name: Mobile Regression Report
    runs-on: ubuntu-latest
    needs: [static, unit-ui, accessibility]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - name: Print regression summary
        run: |
          echo "## Mobile Regression Report"
          echo "Scope: ${{ github.event.inputs.scope }}"
          echo "Triggered by: ${{ github.actor }}"
