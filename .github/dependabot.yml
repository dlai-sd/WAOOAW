# Dependabot configuration
# NOTE: Dependabot does not support a true "manual trigger" mode (like workflow_dispatch).
# To approximate "manual-only", we set `open-pull-requests-limit: 0` so Dependabot will not
# open PRs automatically. To re-enable updates, set the limit back to a positive number.
version: 2

updates:
  # Python — Plant backend
  - package-ecosystem: "pip"
    directory: "/src/Plant/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "plant-backend"
    commit-message:
      prefix: "chore(deps)"
    # Never auto-merge — require human review
    allow:
      - dependency-type: "direct"

  # Python — CP backend
  - package-ecosystem: "pip"
    directory: "/src/CP/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "cp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"

  # Python — PP backend
  - package-ecosystem: "pip"
    directory: "/src/PP/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "pp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
