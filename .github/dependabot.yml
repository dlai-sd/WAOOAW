# Dependabot configuration — E5-S1 (Iteration 7: Scale Prep)
# Each ecosystem gets ONE grouped PR per week — not one PR per package.
# Never auto-merged; requires human review before sprint merge.
version: 2

updates:
  # Python — Plant backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/Plant/BackEnd"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "python"
      - "plant-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      plant-python-deps:
        patterns:
          - "*"

  # Python — CP backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/CP/BackEnd"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "python"
      - "cp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      cp-python-deps:
        patterns:
          - "*"

  # Python — PP backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/PP/BackEnd"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "python"
      - "pp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      pp-python-deps:
        patterns:
          - "*"

  # GitHub Actions (all action bumps in one PR, monthly)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-deps:
        patterns:
          - "*"
