# Dependabot configuration
# NOTE: Dependabot does not support a true manual trigger mode.
# To approximate "manual-only", we set the open PR limit to 0 so it will not create PRs.
# To re-enable updates later, set the limit back to a positive number.
version: 2

updates:
  # Python — Plant backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/Plant/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "plant-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      plant-python-deps:
        patterns:
          - "*"

  # Python — CP backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/CP/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "cp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      cp-python-deps:
        patterns:
          - "*"

  # Python — PP backend (all direct deps in one PR)
  - package-ecosystem: "pip"
    directory: "/src/PP/BackEnd"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"
      - "pp-backend"
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: "direct"
    groups:
      pp-python-deps:
        patterns:
          - "*"

  # GitHub Actions (all action bumps in one PR, monthly)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions-deps:
        patterns:
          - "*"
