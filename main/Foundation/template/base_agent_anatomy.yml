    │  • Reflex: Tool not in tool_authorizations → instant reject                  │
    └─────────────────────────────────────────────────────────────────────────────┘
    
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  ORGAN 2: StateManager                                                        │
    │  • Persist to EEPROM files (audit_log.jsonl with sha256 hash chain)          │
