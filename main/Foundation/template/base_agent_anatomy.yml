# Constitutional Compliance Validation
constitutional_compliance:
  l0_principles:
    - principle: "agent_specialization"
      enforcement: "Cellular level - every organ validates task within job_role boundaries before execution"
      reflex_response: "<10ms rejection if outside task_boundaries"
    
    - principle: "constitutional_embodiment"
      enforcement: "Brain + every organ queries constitution, precedent cache mandatory"
      reflex_response: "Hardcoded constitutional principles bypass Think phase (instant enforcement)"
    
    - principle: "deny_by_default"
      enforcement: "ConfigLoader refuses unauthorized tools, MessageBus filters unauthorized senders"
      reflex_response: "Unknown external API call → instant block + log to errors.jsonl"
    
    - principle: "single_governor_invariant"
      enforcement: "External actions require approval gate before execution (MessageBus enforces)"
      reflex_response: "External communication without approval_granted flag → instant block"
  
  amendment_001:
    filesystem_memory: "5 persistent files (EEPROM pattern) survive stop/start cycles"
    vector_embeddings: "Brain queries Constitutional Vector DB, 10-query/day budget enforced by MetabolicTracker"
    precedent_cache: "precedents.json loaded into RAM on boot, checked before vector DB"
    hash_chained_audit: "StateManager validates audit_log.jsonl hash chain on every write"

# Agent Architecture - PCB Model (Historical Conceptual Model)
architecture:
  model: "PCB (Printed Circuit Board) - Hot-swappable organs, persistent memory, self-healing"
  
  visual_diagram: |
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │                           AGENT ANATOMY (PCB Model)                          │
    │                        agents/{agent_id}/ - Base Agent                       │
    └─────────────────────────────────────────────────────────────────────────────┘
    
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  POWER SUPPLY (OperateMe Interface)                                          │
    │  States: stopped → starting → running → paused → stopping → stopped          │
    │  Control: systemd service / Windows Service (OS manages lifecycle)           │
    └─────────────────────────────────────────────────────────────────────────────┘
              │
              ▼
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  EEPROM MEMORY (Non-Volatile, Survives Restarts)                             │
    │  📁 plan.md              - Goals, checkboxes, completion tracking            │
    │  📁 errors.jsonl         - Failure log (timeouts, crashes, violations)       │
    │  📁 precedents.json      - Cached precedent seeds (1-hour TTL)               │
    │  📁 constitution_snapshot - Immutable constitutional version                 │
    │  📁 audit_log.jsonl      - Hash-chained decision log (tampering detection)   │
    └─────────────────────────────────────────────────────────────────────────────┘
              │
              ▼
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  BRAIN (main.py - 3 Control Threads)                                         │
    │  ┌──────────────────────┬──────────────────────┬──────────────────────────┐ │
    │  │  Thread 1:            │  Thread 2:            │  Thread 3:              │ │
    │  │  MessageRouter        │  HealthWatcher        │  DecisionEngine         │ │
    │  │  (10ms cycle)         │  (10s heartbeat)      │  (GoalManager 100ms)    │ │
    │  │                       │                       │                          │ │
    │  │  • Read nerve cord    │  • Poll organs        │  • Think→Act→Observe    │ │
    │  │  • Dispatch to organs │  • Detect crashes     │  • Track goals          │ │
    │  │  • Route responses    │  • Respawn organs     │  • Celebrate/Escalate   │ │
    │  └──────────────────────┴──────────────────────┴──────────────────────────┘ │
    │                                                                               │
    │  Distress Signals: WARN→log, ERROR→retry, CRITICAL→suspend                  │
    └───────────────────────────────┬─────────────────────────────────────────────┘
                                    │
                                    ▼
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  🛡️ CONSTITUTIONAL GUARDIAN (Layer 0 Enforcement) 🛡️                        │
    │  Position: Between Brain and Nerve Cord (Message Interceptor)                │
    │                                                                               │
    │  Validation Checks (<5ms):                                                   │
    │  ✓ Task boundaries (within can_do list?)                                     │
    │  ✓ Approval gates (external action has approval_granted flag?)               │
    │  ✓ Budget limits (cost <$10/day, queries <10/day)                            │
    │  ✓ Constitutional version (drift detection)                                  │
    │  ✓ Precedent alignment (check cache for similar scenarios)                   │
    │                                                                               │
    │  Circuit Breaker: ✅ Valid → forward | ❌ Invalid → block + reject reason    │
    └───────────────────────────────┬─────────────────────────────────────────────┘
                                    │
                                    ▼
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  NERVE CORD (Internal Message Bus - Redis Pub/Sub or Python Queue)           │
    │  Channels: config.loaded, state.persisted, skill.started, skill.completed,   │
    │            heartbeat.request, heartbeat.response, ethics.gate.required        │
    │                                                                               │
    │  Message Format: {message_id, sender, recipient, timestamp, nonce, payload}  │
    │  Security: ImmuneSystem validates nonce (replay attack prevention)           │
    └───┬───────┬───────┬───────┬───────┬───────┬───────┬───────┬─────────────────┘
        │       │       │       │       │       │       │       │
        ▼       ▼       ▼       ▼       ▼       ▼       ▼       ▼
    ┌───────┐┌───────┐┌───────┐┌───────┐┌───────┐┌───────┐┌───────┐┌─────────────┐
    │Config ││State  ││Skill  ││Const. ││Message││Health ││Metab. ││Immune       │
    │Loader ││Manager││Exec.  ││Query  ││Bus    ││Monitor││Tracker││System       │
    └───────┘└───────┘└───────┘└───────┘└───────┘└───────┘└───────┘└─────────────┘
    
    ┌─────────────────────────────────────────────────────────────────────────────┐
    │  ORGAN 1: ConfigLoader                                                        │
